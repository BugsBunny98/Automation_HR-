name: Playwright E2E

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]
  # Manual trigger with suite selection
  workflow_dispatch:
    inputs:
      test_suite:
        description: 'Test suite to run'
        required: true
        default: 'smoke'
        type: choice
        options:
          - smoke
          - regression
          - onboarding
          - e2e
      use_docker:
        description: 'Run tests in Docker container'
        required: false
        default: false
        type: boolean

concurrency:
  group: playwright-e2e-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
