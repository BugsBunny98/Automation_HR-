jobs:
  # ===========================================================================
  # Smoke Tests — runs on every PR and push to main branches
  # ===========================================================================
  smoke:
    name: Smoke Tests
    if: |
      github.event_name == 'pull_request' ||
      (github.event_name == 'push' && contains(fromJSON('["main", "master", "develop"]'), github.ref_name)) ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.test_suite == 'smoke')
    timeout-minutes: 30
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Typecheck
        run: npm run typecheck

      - name: Run Smoke Tests
        run: npx playwright test --project=smoke
        env:
          CI: true
          SKIP_AUTH_SETUP: '1'

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: smoke-report
          path: playwright-report/
          retention-days: 7

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: smoke-traces
          path: test-results/
          retention-days: 7

  # ===========================================================================
  # Regression Tests — runs on manual dispatch or scheduled
  # ===========================================================================
  regression:
    name: Regression Tests
    if: |
      (github.event_name == 'workflow_dispatch' && github.event.inputs.test_suite == 'regression') ||
      (github.event_name == 'push' && github.ref_name == 'main')
    timeout-minutes: 60
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run Regression Tests
        run: npx playwright test --project=regression
        env:
          CI: true
          SKIP_AUTH_SETUP: '1'

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: regression-report
          path: playwright-report/
          retention-days: 14

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: regression-traces
          path: test-results/
          retention-days: 14

  # ===========================================================================
  # Onboarding Tests — manual dispatch only
  # ===========================================================================
  onboarding:
    name: Onboarding Tests
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.test_suite == 'onboarding'
    timeout-minutes: 45
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run Onboarding Tests
        run: npx playwright test --project=onboarding
        env:
          CI: true
          SKIP_AUTH_SETUP: '1'

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: onboarding-report
          path: playwright-report/
          retention-days: 7

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: onboarding-traces
          path: test-results/
          retention-days: 7

  # ===========================================================================
  # Full E2E Tests — manual dispatch only
  # ===========================================================================
  e2e:
    name: Full E2E Tests
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.test_suite == 'e2e'
    timeout-minutes: 90
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Typecheck
        run: npm run typecheck

      - name: List all tests
        run: npm run test:list

      - name: Run Full E2E Suite
        run: npm run test:e2e
        env:
          CI: true
          SKIP_AUTH_SETUP: '1'

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: e2e-report
          path: playwright-report/
          retention-days: 14

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: e2e-traces
          path: test-results/
          retention-days: 14

  # ===========================================================================
  # Docker-based Tests — optional, for consistent environment
  # ===========================================================================
  docker-tests:
    name: Docker Tests
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.use_docker == 'true'
    timeout-minutes: 60
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: playwright-e2e:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run tests in Docker
        run: |
          docker run --rm \
            -e CI=true \
            -e TEST_SUITE=${{ github.event.inputs.test_suite }} \
            -e E2E_BASE_URL=${{ env.E2E_BASE_URL }} \
            -e E2E_STAGING_OTP=${{ env.E2E_STAGING_OTP }} \
            -e SKIP_AUTH_SETUP=1 \
            -v ${{ github.workspace }}/test-results:/app/test-results \
            -v ${{ github.workspace }}/playwright-report:/app/playwright-report \
            playwright-e2e:ci

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: docker-report
          path: playwright-report/
          retention-days: 7

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: docker-traces
          path: test-results/
          retention-days: 7
