name: Playwright E2E

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master, release/**]
  workflow_dispatch:
    inputs:
      suite:
        description: 'Test suite to run'
        required: true
        default: regression
        type: choice
        options:
          - smoke
          - regression
          - onboarding

concurrency:
  group: playwright-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: write

# ─────────────────────────────────────────────────────────────────────────────
# Smoke — runs on every PR and every push to main
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  smoke:
    name: Smoke Tests
    if: |
      github.event_name == 'pull_request' ||
      (github.event_name == 'push') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.suite == 'smoke')
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Typecheck
        run: npm run typecheck

      - name: Run smoke tests
        run: npx playwright test --project=smoke
        env:
          CI: 'true'
          SKIP_AUTH_SETUP: '1'
          E2E_BASE_URL: ${{ secrets.APP_BASE_URL || 'https://staging.bluworks.io' }}
          E2E_STAGING_OTP: ${{ secrets.STAGING_OTP || '8182' }}
          TEST_EMAIL: ${{ secrets.TEST_EMAIL }}
          TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: smoke-html-report
          path: playwright-report/
          retention-days: 7

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: smoke-traces
          path: test-results/
          retention-days: 7

# ─────────────────────────────────────────────────────────────────────────────
# Regression — manual dispatch only
# ─────────────────────────────────────────────────────────────────────────────
  regression:
    name: Regression Tests
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.suite == 'regression'
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run regression tests
        run: npx playwright test --project=regression
        env:
          CI: 'true'
          SKIP_AUTH_SETUP: '1'
          E2E_BASE_URL: ${{ secrets.APP_BASE_URL || 'https://staging.bluworks.io' }}
          E2E_STAGING_OTP: ${{ secrets.STAGING_OTP || '8182' }}
          TEST_EMAIL: ${{ secrets.TEST_EMAIL }}
          TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: regression-html-report
          path: playwright-report/
          retention-days: 14

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: regression-traces
          path: test-results/
          retention-days: 14

# ─────────────────────────────────────────────────────────────────────────────
# Onboarding — manual dispatch only
# ─────────────────────────────────────────────────────────────────────────────
  onboarding:
    name: Onboarding Tests
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.suite == 'onboarding'
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run onboarding tests
        run: npx playwright test --project=onboarding
        env:
          CI: 'true'
          SKIP_AUTH_SETUP: '1'
          E2E_BASE_URL: ${{ secrets.APP_BASE_URL || 'https://staging.bluworks.io' }}
          E2E_STAGING_OTP: ${{ secrets.STAGING_OTP || '8182' }}
          TEST_EMAIL: ${{ secrets.TEST_EMAIL }}
          TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: onboarding-html-report
          path: playwright-report/
          retention-days: 7

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: onboarding-traces
          path: test-results/
          retention-days: 7
