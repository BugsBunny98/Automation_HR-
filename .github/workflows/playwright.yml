name: Playwright E2E

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]
  # Run from GitHub → Actions → "Playwright E2E" → Run workflow
  workflow_dispatch:

concurrency:
  group: playwright-e2e-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: write # upload Playwright HTML report artifact

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Typecheck
        run: npm run typecheck

      - name: List tests
        run: npm run test:list

      - name: Run E2E (full suite)
        run: npm run test:e2e
        env:
          CI: true
          E2E_BASE_URL: https://staging.bluworks.io

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
